server:
  port: ${PORT:8080}

spring:
  application:
    name: techcup-futbol
  security:
    user:
      name: admin
      password: 1234

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techcup}
    username: techcup_owner
    password: techcup123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    "com.escuela.techcup": DEBUG
  file:
    name: logs/api.log

jwt:
  secret: test-secret-key-for-jwt-signing-must-be-long-enough-for-security-purposes-change-this-in-production-xd
  expiration: 86400000