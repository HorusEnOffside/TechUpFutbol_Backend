services:

  # ================================
  # Base de datos PostgreSQL
  # ================================
  db:
    image: postgres:16-alpine
    container_name: techcup-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: techcup
      POSTGRES_USER: techcup_owner
      POSTGRES_PASSWORD: techcup123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techcup_owner -d techcup"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Backend Spring Boot
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techcup-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/techcup
    ports:
      - "8443:8443"
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data: